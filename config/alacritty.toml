[font]
size = 10

[colors.primary]
foreground = "#E5E5E5"
background = "#000000"

[colors.normal]
black = "#000000"
red = "#cd0000"
green = "#00cd00"
yellow = "#cdcd00"
blue = "#3c3ccd"
magenta = "#cd00cd"
cyan = "#00cdcd"
white = "#e5e5e5"

[colors.bright]
black = "#7f7f7f"
red = "#ff0000"
green = "#00ff00"
yellow = "#ffff00"
blue = "#5c5cff"
magenta = "#ff00ff"
cyan = "#00ffff"
white = "#ffffff"

[colors]
draw_bold_text_with_bright_colors = true

[mouse]
hide_when_typing = true

[window]
dynamic_title = true

[env]
TERM = "xterm-256color"
